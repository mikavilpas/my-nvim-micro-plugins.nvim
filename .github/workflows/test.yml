---
name: Run tests
on:
  pull_request: ~
  push:
    branches:
      - main
permissions:
  contents: read

env:
  # renovate: datasource=git-refs-master packageName=https://github.com/neovim/neovim
  NEOVIM_NIGHTLY_COMMIT: 7945732ed7bb211f91112292a13b51fc3182599b

jobs:
  build-neovim-nightly:
    name: Build pinned Neovim nightly
    runs-on: ubuntu-24.04
    steps:
      - name: Build pinned Neovim nightly
        uses: mikavilpas/neovim-action/build-nightly@4f1c9a2235ee7428930602c0ba3e4f20377b61d8 # v3.3.0
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}

  busted:
    name: "Busted"
    runs-on: ubuntu-24.04
    needs: build-neovim-nightly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download pinned Neovim nightly
        uses: mikavilpas/neovim-action/restore-nightly@4f1c9a2235ee7428930602c0ba3e4f20377b61d8 # v3.3.0
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}

      - name: Run tests
        uses: mikavilpas/neovim-action/busted@4f1c9a2235ee7428930602c0ba3e4f20377b61d8 # v3.3.0

  build:
    name: Run tests
    needs: build-neovim-nightly
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install tools with UBI
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          # make the tools available for subsequent steps
          echo "$(pwd)/bin" >> "$GITHUB_PATH"
          curl --silent --location \
              https://raw.githubusercontent.com/houseabsolute/ubi/master/bootstrap/bootstrap-ubi.sh |
              TARGET="$HOME/.local/bin" sh

          # fd is used for searching files
          VERSION=$(yq '.tools."github:sharkdp/fd"' mise.toml)
          ubi --project sharkdp/fd --tag "v$VERSION"

          # ripgrep is a snacks.nvim grep dependency
          VERSION=$(yq '.tools."github:BurntSushi/ripgrep".version' mise.toml)
          ubi --project BurntSushi/ripgrep --tag "$VERSION" --exe rg

          # realpath is used to resolve relative paths
          which realpath || {
            # just fail with an error message if realpath is not found
            echo "realpath is not installed, but it should be part of GNU coreutils and included in Ubuntu"
            exit 1
          }

          ls -alR bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download pinned Neovim nightly
        uses: mikavilpas/neovim-action/restore-nightly@4f1c9a2235ee7428930602c0ba3e4f20377b61d8 # v3.3.0
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # https://github.com/pnpm/action-setup?tab=readme-ov-file#use-cache-to-reduce-installation-time
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install

      # need to work around https://github.com/cypress-io/github-action/issues/1246
      - run: pnpm --filter integration-tests exec cypress install

      - name: Preinstall neovim plugins
        run: pnpm tui neovim exec "Lazy! sync"
        working-directory: packages/integration-tests

      - name: Cypress test
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7
        with:
          install: false
          working-directory: packages/integration-tests
          command: pnpm exec tui run

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        # add the line below to store screenshots only on failures
        # if: failure()
        if: failure()
        with:
          name: cypress-screenshots
          path: packages/integration-tests/cypress/screenshots
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`
